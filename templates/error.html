{% extends "base.html" %}

{% block title %}Erro - portScan{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-box">
        <h1>❌ {{ error }}</h1>
        <p class="error-code">Erro</p>
        <p class="error-message">{{ message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">← Voltar para Início</a>
    </div>
</div>

<style>
.error-page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
}

.error-box {
    text-align: center;
    background: white;
    padding: 3rem;
    border-radius: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    max-width: 500px;
}

.error-box h1 {
    color: #dc3545;
    margin-bottom: 1rem;
}

.error-code {
    font-size: 1.5rem;
    color: #666;
    margin-bottom: 1rem;
}

.error-message {
    color: #999;
    margin-bottom: 2rem;
}
</style>
{% endblock %}
